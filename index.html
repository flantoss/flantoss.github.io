<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index.html</title>
<link href="style.css" rel="stylesheet">
<style>
    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        text-align: center;
    }

    #top {
        margin-top: 20px;
    }

    #center-block {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        flex-grow: 1;
    }

    #magicText {
        font-size: 8vw;
        font-weight: bold;
        margin-top: 20px;
        display: none;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 90%;
    }

    .styled {
        margin: 10px auto 0 auto;
        border: 0;
        line-height: 2.5;
        padding: 0 20px;
        font-size: 1rem;
        text-align: center;
        color: white;
        text-shadow: 1px 1px 1px black;
        border-radius: 10px;
        background-color: tomato;
        background-image: linear-gradient(
            to top left,
            rgb(0 0 0 / 20%),
            rgb(0 0 0 / 20%) 30%,
            transparent
        );
        box-shadow:
            inset 2px 2px 3px rgb(255 255 255 / 60%),
            inset -2px -2px 3px rgb(0 0 0 / 60%);
    }

    .styled:hover {
        background-color: red;
    }

    .styled:active {
        box-shadow:
            inset -2px -2px 3px rgb(255 255 255 / 60%),
            inset 2px 2px 3px rgb(0 0 0 / 60%);
    }
</style>
</head>
<body>
<div id="top">
<p>OUI ! J'ai codé le site juste pour la vanne...  😔</p>
<p>ET ALORS ??</p>
</div>

<div id="center-block">
<p>Juste un dernier truc avant de partir ...</p>
<p><b>SOB SOB SOB !!!</b></p>
<input class="styled" type="button" value="Répondre ⛱️" id="btn"/>
<div id="magicText">✨ SODOMIE ✨</div>
</div>

<script>
const btn = document.getElementById('btn');
const magicText = document.getElementById('magicText');

function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

let interval;

btn.addEventListener('click', () => {
    magicText.style.display = 'block';
    if(interval) clearInterval(interval);
    interval = setInterval(() => {
        magicText.style.color = getRandomColor();
    }, 200);
});
</script>
</body>
</html>
