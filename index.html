<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index.html</title>
<link href="style.css" rel="stylesheet">
<style>
    /* Centrer horizontalement et gérer la taille du texte magique */
    #magicText {
        font-size: 5em;       /* texte géant */
        font-weight: bold;
        margin-top: 40px;
        display: none;         /* caché au départ */
        text-align: center;    /* centré horizontalement */
    }
</style>
</head>
<body>
<p>OUI ! J'ai codé le site juste pour la vanne...  😔</p>
<br>
<p>ET ALORS ??</p>
<br><br>
<p>Juste un dernier truc avant de partir ...</p>
<p>SOB SOB SOB !!!</p>
<input class="styled" type="button" value="Répondre ⛱️" id="btn"/>

<!-- Texte magique -->
<div id="magicText">🎉 WOUHOU ! 🎉</div>

<script>
const btn = document.getElementById('btn');
const magicText = document.getElementById('magicText');

// Fonction pour générer une couleur aléatoire
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

let interval;

btn.addEventListener('click', () => {
    magicText.style.display = 'block'; // rendre visible
    if(interval) clearInterval(interval); // éviter multiples timers
    interval = setInterval(() => {
        magicText.style.color = getRandomColor();
    }, 200);
});
</script>
</body>
</html>
